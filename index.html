<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Gateway</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <button class="dark-toggle" id="darkToggle" aria-label="Toggle dark mode">
    <i class="fas fa-moon"></i>
  </button>

  <div class="container">
    <!-- Order Summary -->
    <div class="summary-card">
      <div class="product-icon"><i class="fas fa-box-open"></i></div>
      <h2 class="product-name">Premium Plan</h2>
      <p class="product-desc">1-year subscription · All features included</p>
      <div class="price-row">
        <span class="label">Subtotal</span>
        <span>₹4,999</span>
      </div>
      <div class="price-row">
        <span class="label">GST (18%)</span>
        <span>₹899</span>
      </div>
      <div class="divider"></div>
      <div class="price-row total">
        <span>Total</span>
        <span>₹5,898</span>
      </div>
      <div class="secure-badge"><i class="fas fa-lock"></i> 256-bit SSL Secured</div>
    </div>

    <!-- Payment Card -->
    <div class="payment-card">
      <h2 class="payment-title">Choose Payment Method</h2>

      <!-- Method Tabs -->
      <div class="method-tabs" role="tablist">
        <button class="tab active" data-tab="card" role="tab" aria-selected="true">
          <i class="fas fa-credit-card"></i> Card
        </button>
        <button class="tab" data-tab="upi" role="tab" aria-selected="false">
          <i class="fas fa-mobile-alt"></i> UPI
        </button>
        <button class="tab" data-tab="netbanking" role="tab" aria-selected="false">
          <i class="fas fa-university"></i> Net Banking
        </button>
      </div>

      <!-- Card Form -->
      <div class="tab-content active" id="card">
        <form id="cardForm" novalidate>
          <div class="card-preview" id="cardPreview">
            <div class="card-preview-top">
              <span class="card-chip"><i class="fas fa-microchip"></i></span>
              <span class="card-network" id="cardNetwork"></span>
            </div>
            <div class="card-number-preview" id="cardNumberPreview">•••• •••• •••• ••••</div>
            <div class="card-preview-bottom">
              <div>
                <div class="card-label">Card Holder</div>
                <div id="cardHolderPreview">YOUR NAME</div>
              </div>
              <div>
                <div class="card-label">Expires</div>
                <div id="cardExpiryPreview">MM/YY</div>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label for="cardNumber">Card Number</label>
            <div class="input-wrap">
              <i class="fas fa-credit-card input-icon"></i>
              <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19" autocomplete="cc-number" />
            </div>
            <span class="error" id="cardNumberError"></span>
          </div>

          <div class="form-group">
            <label for="cardHolder">Card Holder Name</label>
            <div class="input-wrap">
              <i class="fas fa-user input-icon"></i>
              <input type="text" id="cardHolder" placeholder="John Doe" autocomplete="cc-name" />
            </div>
            <span class="error" id="cardHolderError"></span>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="expiry">Expiry Date</label>
              <div class="input-wrap">
                <i class="fas fa-calendar input-icon"></i>
                <input type="text" id="expiry" placeholder="MM/YY" maxlength="5" autocomplete="cc-exp" />
              </div>
              <span class="error" id="expiryError"></span>
            </div>
            <div class="form-group">
              <label for="cvv">CVV</label>
              <div class="input-wrap">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" id="cvv" placeholder="•••" maxlength="3" autocomplete="cc-csc" />
              </div>
              <span class="error" id="cvvError"></span>
            </div>
          </div>

          <button type="submit" class="pay-btn">
            <i class="fas fa-lock"></i> Pay ₹5,898
          </button>
        </form>
      </div>

      <!-- UPI Form -->
      <div class="tab-content" id="upi">
        <form id="upiForm" novalidate>
          <div class="upi-logos">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e1/UPI-Logo-vector.svg/200px-UPI-Logo-vector.svg.png" alt="UPI" class="upi-logo" />
          </div>

          <div class="form-group">
            <label for="upiId">UPI ID</label>
            <div class="input-wrap">
              <i class="fas fa-at input-icon"></i>
              <input type="text" id="upiId" placeholder="yourname@upi" autocomplete="off" />
            </div>
            <span class="error" id="upiError"></span>
          </div>

          <div class="qr-section">
            <p class="qr-label">Or scan QR code</p>
            <div class="qr-box">
              <img src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=upi://pay?pa=merchant@upi&pn=PremiumPlan&am=5898&cu=INR" alt="QR Code" />
              <p class="qr-hint">Scan with any UPI app</p>
            </div>
          </div>

          <button type="submit" class="pay-btn">
            <i class="fas fa-lock"></i> Pay ₹5,898
          </button>
        </form>
      </div>

      <!-- Net Banking Form -->
      <div class="tab-content" id="netbanking">
        <form id="netbankingForm" novalidate>
          <div class="form-group">
            <label for="bankSelect">Select Your Bank</label>
            <div class="input-wrap">
              <i class="fas fa-university input-icon"></i>
              <select id="bankSelect">
                <option value="">-- Choose a bank --</option>
                <option value="sbi">State Bank of India</option>
                <option value="hdfc">HDFC Bank</option>
                <option value="icici">ICICI Bank</option>
                <option value="axis">Axis Bank</option>
                <option value="kotak">Kotak Mahindra Bank</option>
                <option value="pnb">Punjab National Bank</option>
              </select>
            </div>
            <span class="error" id="bankError"></span>
          </div>

          <div class="bank-logos">
            <div class="bank-chip" data-bank="sbi">SBI</div>
            <div class="bank-chip" data-bank="hdfc">HDFC</div>
            <div class="bank-chip" data-bank="icici">ICICI</div>
            <div class="bank-chip" data-bank="axis">Axis</div>
            <div class="bank-chip" data-bank="kotak">Kotak</div>
            <div class="bank-chip" data-bank="pnb">PNB</div>
          </div>

          <button type="submit" class="pay-btn">
            <i class="fas fa-lock"></i> Pay ₹5,898
          </button>
        </form>
      </div>

      <!-- Loading Overlay -->
      <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p class="loading-text">Processing payment...</p>
      </div>

      <!-- Result Screen -->
      <div class="result-screen" id="resultScreen">
        <div class="result-icon" id="resultIcon"></div>
        <h3 id="resultTitle"></h3>
        <p id="resultMsg"></p>
        <button class="pay-btn retry-btn" id="retryBtn">Try Again</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
